
<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Visual Novel Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/vn.css">
</head>
<body>

  <div id="game">
    <div id="bg"></div>

    <img id="char-left" class="char" src="" alt="">
    <img id="char-right" class="char" src="" alt="">

    <!-- 選項按鈕應該放在對話框外 -->
    <div id="choices" class="hidden">
      <button id="choiceA">選項 A</button>
      <button id="choiceB">選項 B</button>
    </div>

    <div id="dialogue-box">
      <div id="name-box"></div>
      <div id="text-box"></div>
      <button id="next-btn">下一句 ▶</button>
    </div>
  </div>

  <script src="js/vn.js"></script>
</body>
</html>
